<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Dashboard - PDRS</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .faculty-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .action-btns { display: flex; gap: 0.5rem; }
  </style>
</head>
<body>
  <nav class="navbar" id="main-nav"></nav>

  <main class="container">
    <div id="faculty-guard" style="display:none; text-align: center; padding: 4rem 0;">
      <h2>Access Denied</h2>
      <p style="margin-bottom: 2rem;">Please login as faculty to access this dashboard.</p>
      <a href="faculty-login.html" class="btn btn-primary">Faculty Login</a>
    </div>

    <div id="faculty-content" class="stagger-children">
      <div class="faculty-header">
        <div>
          <h1>Faculty Dashboard</h1>
          <p style="color: var(--text-muted);">Manage students, monitor progress, and host live defense sessions.</p>
        </div>
        <div class="action-btns">
          <a href="analytics.html" class="btn btn-secondary">Cohort Analytics</a>
          <button id="logout-btn" class="btn btn-ghost">Logout</button>
        </div>
      </div>

      <div class="card">
        <div class="data-table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Student Name</th>
                <th>Year/Branch</th>
                <th>Project Title</th>
                <th>Sessions</th>
                <th>Baseline</th>
                <th>Final</th>
                <th>Δ</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="students-tbody">
              <!-- Skeleton rows -->
              <tr><td colspan="8"><div class="skeleton" style="height: 40px; margin: 0.5rem 0;"></div></td></tr>
              <tr><td colspan="8"><div class="skeleton" style="height: 40px; margin: 0.5rem 0;"></div></td></tr>
              <tr><td colspan="8"><div class="skeleton" style="height: 40px; margin: 0.5rem 0;"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="nav.js"></script>
  <script>
    const facultyToken = localStorage.getItem('facultyToken');
    if (!facultyToken) {
      document.getElementById('faculty-guard').style.display = 'block';
      document.getElementById('faculty-content').style.display = 'none';
    } else {
      loadStudents();
    }

    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('facultyToken');
      localStorage.removeItem('facultyRole');
      window.location.href = 'index.html';
    });

    async function loadStudents() {
      try {
        const res = await fetch('/api/students');
        if (!res.ok) throw new Error('Failed to fetch students');
        const students = await res.json();
        renderStudents(students);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function renderStudents(students) {
      const tbody = document.getElementById('students-tbody');
      if (students.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 2rem;">No students registered yet.</td></tr>';
        return;
      }

      tbody.innerHTML = students.map((s, i) => {
        const delta = s.final - s.baseline;
        const deltaClass = delta > 0 ? 'delta-up' : (delta < 0 ? 'delta-down' : '');
        const deltaIcon = delta > 0 ? '↑' : (delta < 0 ? '↓' : '-');

        return `
          <tr class="stagger-children" style="animation-delay: ${i * 0.05}s">
            <td style="font-weight: 600;">${s.name}</td>
            <td style="font-size: 0.8rem; color: var(--text-muted);">${s.year} / ${s.branch}</td>
            <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${s.title}">${s.title}</td>
            <td>${s.sessionCount}</td>
            <td>${(s.baseline || 0).toFixed(2)}</td>
            <td>${(s.final || 0).toFixed(2)}</td>
            <td class="${deltaClass}" style="font-weight: 700;">${deltaIcon} ${(Math.abs(delta) || 0).toFixed(2)}</td>
            <td>
              <div class="action-btns">
                <button class="btn btn-ghost btn-sm" onclick="generateQuestions('${s.id}', this)" ${s.questionsGenerated?'disabled':''}>
                  ${s.questionsGenerated ? 'Ready' : 'Gen Qs'}
                </button>
                <a href="session-create.html?studentId=${s.id}" class="btn btn-secondary btn-sm">Host</a>
                <a href="profile.html?studentId=${s.id}" class="btn btn-ghost btn-sm">Profile</a>
                <button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.id}', this)">×</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function generateQuestions(id, btn) {
      btn.classList.add('btn--loading');
      try {
        const res = await fetch(`/api/generate-questions/${id}`, { method: 'POST' });
        if (!res.ok) throw new Error('Generation failed');
        showToast('Questions generated!', 'success');
        loadStudents();
      } catch (err) {
        showToast(err.message, 'error');
        btn.classList.remove('btn--loading');
      }
    }

    async function deleteStudent(id, btn) {
      if (!confirm('Are you sure you want to delete this student and all their data?')) return;
      
      btn.closest('tr').style.opacity = '0.5';
      try {
        const res = await fetch(`/api/students/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Delete failed');
        showToast('Student deleted', 'info');
        loadStudents();
      } catch (err) {
        showToast(err.message, 'error');
        btn.closest('tr').style.opacity = '1';
      }
    }
  </script>
</body>
</html>
