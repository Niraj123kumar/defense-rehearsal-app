<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Coaching - PDRS</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .coaching-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .dimension-card { border-top: 4px solid var(--accent-indigo); }
    blockquote { background: var(--bg-secondary); padding: 1rem; border-radius: var(--radius-sm); border-left: 3px solid var(--accent-amber); font-style: italic; margin: 1rem 0; font-size: 0.9rem; }
    .practice-widget { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-subtle); }
  </style>
</head>
<body>
  <nav class="navbar" id="main-nav"></nav>

  <main class="container">
    <div id="coaching-guard" style="display:none; text-align: center; padding: 4rem 0;">
      <div class="card" style="max-width: 500px; margin: 0 auto;">
        <div style="font-size: 3rem; margin-bottom: 1rem;">📋</div>
        <h2>Complete a solo session first</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">We need at least one completed session to analyze your performance and provide coaching.</p>
        <a href="defense.html" class="btn btn-primary">Start Solo Practice</a>
      </div>
    </div>

    <div id="coaching-content" class="stagger-children">
      <h1 style="margin-bottom: 0.5rem;">AI Coaching Panel</h1>
      <p style="color: var(--text-muted); margin-bottom: 2.5rem;">Personalized tips and targeted questions to help you improve your defense skills.</p>

      <div id="skeleton-coaching" class="coaching-grid">
        <div class="card skeleton" style="height: 400px;"></div>
        <div class="card skeleton" style="height: 400px;"></div>
      </div>

      <div id="coaching-data" class="coaching-grid" style="display:none;"></div>
    </div>
  </main>

  <script src="nav.js"></script>
  <script>
    const studentId = localStorage.getItem('studentId');
    if (!studentId) window.location.href = 'onboarding.html';

    async function loadCoaching() {
      try {
        const res = await fetch(`/api/coaching/${studentId}`, { method: 'POST' });
        if (res.status === 400) {
          document.getElementById('coaching-guard').style.display = 'block';
          document.getElementById('coaching-content').style.display = 'none';
          return;
        }
        if (!res.ok) throw new Error('Failed to fetch coaching data');
        
        const { coaching } = await res.json();
        renderCoaching(coaching);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function renderCoaching(data) {
      const container = document.getElementById('coaching-data');
      const weakDims = data.weakDimensions.length > 0 ? data.weakDimensions : ['clarity', 'reasoning']; // Fallback
      
      container.innerHTML = weakDims.map((dim, i) => `
        <div class="card dimension-card stagger-children" style="animation-delay: ${i * 0.2}s">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h2 style="text-transform: capitalize;">${dim}</h2>
            <div class="tier-badge tier-2">Avg: ${(data.dimAverages[dim] || 0).toFixed(1)}/5</div>
          </div>
          <p style="color: var(--text-muted); font-size: 0.9rem;">Your performance in this dimension shows room for growth.</p>
          
          <blockquote>${data.tips[dim] || `Focus on structure and detail when explaining ${dim} aspects of your project.`}</blockquote>
          
          <div class="practice-widget">
            <h4 style="margin-bottom: 1rem;">Targeted Practice</h4>
            ${(data.questions[dim] || [`Explain the core logic of your project with a focus on ${dim}.`]).map((q, j) => `
              <div class="question-item" style="margin-bottom: 1.5rem;">
                <p style="font-weight: 500; margin-bottom: 0.75rem;">${q}</p>
                <textarea class="form-textarea" placeholder="Draft your improved answer..." rows="3"></textarea>
                <button class="btn btn-secondary btn-sm" style="margin-top: 0.5rem;" onclick="evaluateCoachingAnswer(this, '${dim}', '${q.replace(/'/g, "\\'")}')">Check Improvement</button>
                <div class="inline-result" style="display:none; margin-top: 1rem; font-size: 0.85rem; padding: 0.75rem; background: var(--bg-hover); border-radius: var(--radius-sm);"></div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');

      document.getElementById('skeleton-coaching').style.display = 'none';
      container.style.display = 'grid';
    }

    async function evaluateCoachingAnswer(btn, dim, questionText) {
      const textarea = btn.previousElementSibling;
      const resultDiv = btn.nextElementSibling;
      const answer = textarea.value.trim();
      if (!answer) return showToast('Please type an answer first', 'warning');

      btn.classList.add('btn--loading');
      try {
        const res = await fetch('/api/evaluate-answer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentId, questionText, answer, tier: 2 })
        });
        const { scores } = await res.json();
        
        resultDiv.innerHTML = `
          <div style="color: var(--accent-indigo); font-weight: 700; margin-bottom: 0.25rem;">Score: ${scores[dim].toFixed(1)}/5.0</div>
          <p>${scores.feedback}</p>
        `;
        resultDiv.style.display = 'block';
        triggerConfetti();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.classList.remove('btn--loading');
      }
    }

    loadCoaching();
  </script>
</body>
</html>
