<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Panel - PDRS</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    .teacher-layout { max-width: 600px; margin: 2rem auto; }
    #auth-panel { text-align: center; padding: 4rem 0; }
    #panel-view { display: none; }
    .scoring-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; margin: 2rem 0; }
    .range-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .range-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-faint); }
    .transcript-mini { height: 100px; overflow-y: auto; background: var(--bg-secondary); padding: 1rem; border-radius: var(--radius-sm); margin-bottom: 1.5rem; font-size: 0.9rem; font-style: italic; }
    .latest-chunk { color: var(--accent-amber); animation: pulseSoft 1s infinite; }
  </style>
</head>
<body>
  <nav class="navbar" id="main-nav"></nav>

  <main class="container teacher-layout">
    <!-- Auth Step -->
    <div id="auth-panel" class="card stagger-children">
      <div style="font-size: 3rem; margin-bottom: 1rem;">👨‍🏫</div>
      <h2>Join Defense Panel</h2>
      <p style="color: var(--text-muted); margin-bottom: 2rem;">Please identify yourself to join the session.</p>
      
      <form id="teacher-auth-form">
        <div class="form-group">
          <label class="form-label">Your Name</label>
          <input type="text" id="teacher-name" class="form-input" required placeholder="Dr. Smith">
        </div>
        <div class="form-group">
          <label class="form-label">Faculty Password</label>
          <input type="password" id="teacher-pw" class="form-input" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Join Session</button>
      </form>
    </div>

    <!-- Panel View -->
    <div id="panel-view" class="stagger-children">
      <div class="card" style="margin-bottom: 1.5rem;">
        <div class="form-label" style="color: var(--accent-amber);">Live Transcript</div>
        <div id="teacher-transcript" class="transcript-mini">
          <p style="color: var(--text-faint);">Waiting for student to speak...</p>
        </div>
        <div style="display: flex; gap: 0.5rem;">
          <input type="text" id="panel-q-input" class="form-input" placeholder="Ask a panel question...">
          <button id="btn-ask" class="btn btn-secondary">Ask</button>
          <button id="btn-interrupt" class="btn btn-danger">Interrupt</button>
        </div>
      </div>

      <div class="card">
        <h3 id="current-q-text">Waiting for question...</h3>
        <div id="scoring-panel" class="scoring-grid">
          <div class="range-group">
            <label class="form-label">Clarity (1-5)</label>
            <input type="range" id="score-clarity" min="1" max="5" step="1" value="3" class="form-range">
            <div class="range-labels"><span>Vague</span><span>Exceptional</span></div>
          </div>
          <div class="range-group">
            <label class="form-label">Reasoning (1-5)</label>
            <input type="range" id="score-reasoning" min="1" max="5" step="1" value="3" class="form-range">
            <div class="range-labels"><span>Weak</span><span>Logical</span></div>
          </div>
          <div class="range-group">
            <label class="form-label">Depth (1-5)</label>
            <input type="range" id="score-depth" min="1" max="5" step="1" value="3" class="form-range">
            <div class="range-labels"><span>Surface</span><span>Profound</span></div>
          </div>
          <div class="range-group">
            <label class="form-label">Confidence (1-5)</label>
            <input type="range" id="score-confidence" min="1" max="5" step="1" value="3" class="form-range">
            <div class="range-labels"><span>Hesitant</span><span>Assertive</span></div>
          </div>
          <button id="btn-submit-score" class="btn btn-primary" style="margin-top: 1rem;">Submit Response Score</button>
        </div>
      </div>
    </div>
  </main>

  <script src="nav.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const roomCode = params.get('room');
    let socket = null;
    let teacherData = null;

    if (!roomCode) {
      document.body.innerHTML = '<div class="container" style="text-align:center; padding:4rem;"><h1>Invalid Room</h1><p>This invite link is invalid.</p></div>';
    }

    document.getElementById('teacher-auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const teacherName = document.getElementById('teacher-name').value.trim();
      const password = document.getElementById('teacher-pw').value;

      btn.classList.add('btn--loading');
      
      try {
        const res = await fetch(`/api/sessions/${roomCode}/teacher-auth`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ teacherName, password })
        });

        if (!res.ok) throw new Error('Invalid faculty password');
        
        teacherData = await res.json();
        sessionStorage.setItem('teacherToken', teacherData.token);
        sessionStorage.setItem('teacherId', teacherData.teacherId);
        sessionStorage.setItem('teacherName', teacherData.teacherName);

        initPanel();
      } catch (err) {
        showToast(err.message, 'error');
        document.getElementById('auth-panel').style.animation = 'shake 0.4s';
        setTimeout(() => document.getElementById('auth-panel').style.animation = '', 400);
        btn.classList.remove('btn--loading');
      }
    });

    function initPanel() {
      document.getElementById('auth-panel').style.display = 'none';
      document.getElementById('panel-view').style.display = 'block';
      
      socket = io(window.location.origin);
      socket.emit('join-session', { 
        roomCode, 
        user: { 
          id: teacherData.teacherId, 
          teacherId: teacherData.teacherId,
          teacherName: teacherData.teacherName, 
          role: 'teacher' 
        } 
      });

      socket.on('phase-changed', ({ phase, question }) => {
        if (phase === 'defense') {
          document.getElementById('current-q-text').textContent = question.text;
          document.querySelectorAll('input[type="range"]').forEach(r => r.value = 3);
          document.getElementById('btn-submit-score').disabled = false;
          document.getElementById('btn-submit-score').textContent = 'Submit Response Score';
        } else if (phase === 'closed') {
          showToast('Session ended by host', 'info');
          setTimeout(() => window.location.href = 'index.html', 2000);
        }
      });

      socket.on('transcript-chunk', ({ text, isFinal }) => {
        const container = document.getElementById('teacher-transcript');
        if (container.querySelector('p')) container.innerHTML = '';
        
        const span = document.createElement('span');
        span.textContent = text + ' ';
        if (!isFinal) span.className = 'latest-chunk';
        container.appendChild(span);
        container.scrollTop = container.scrollHeight;
        
        if (!isFinal) {
          setTimeout(() => span.classList.remove('latest-chunk'), 1000);
        }
      });

      document.getElementById('btn-submit-score').addEventListener('click', (e) => {
        const scores = {
          clarity: parseInt(document.getElementById('score-clarity').value),
          reasoning: parseInt(document.getElementById('score-reasoning').value),
          depth: parseInt(document.getElementById('score-depth').value),
          confidence: parseInt(document.getElementById('score-confidence').value)
        };

        socket.emit('teacher-score', { 
          roomCode, 
          teacherId: teacherData.teacherId, 
          scores 
        });

        e.target.disabled = true;
        e.target.textContent = 'Score Submitted ✓';
        showToast('Score sent to host', 'success');
      });

      document.getElementById('btn-ask').addEventListener('click', () => {
        const input = document.getElementById('panel-q-input');
        const question = input.value.trim();
        if (!question) return;

        socket.emit('add-panel-question', { 
          roomCode, 
          teacherName: teacherData.teacherName, 
          question 
        });
        input.value = '';
        showToast('Question added to panel', 'info');
      });

      document.getElementById('btn-interrupt').addEventListener('click', () => {
        socket.emit('teacher-interrupt', { 
          roomCode, 
          teacherName: teacherData.teacherName 
        });
        showToast('Interrupt signal sent!', 'warning');
      });
    }
  </script>
</body>
</html>
