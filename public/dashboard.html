<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard - PDRS</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    .dashboard-header { margin-bottom: 4rem; }
    .greeting { font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem; }
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
    .action-card { display: flex; flex-direction: column; min-height: 240px; position: relative; overflow: hidden; }
    .action-card::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, var(--accent-indigo-glow) 0%, transparent 70%); opacity: 0; transition: opacity 0.4s; pointer-events: none; }
    .action-card:hover::before { opacity: 1; }
    .card-icon { font-size: 3rem; margin-bottom: 1.5rem; display: block; transition: transform 0.4s var(--ease-bounce); }
    .action-card:hover .card-icon { transform: scale(1.2) rotate(5deg); }
    .card-footer { margin-top: auto; padding-top: 2rem; }
    .stats-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 4rem; }
    .stat-mini { padding: 1.5rem; text-align: center; }
  </style>
</head>
<body>
  <nav class="navbar" id="main-nav"></nav>

  <main class="container">
    <header class="dashboard-header stagger-children">
      <div class="greeting visible">Hello, <span id="student-name-display" class="gradient-text typewriter-data" data-phrases='["Explorer", "Scholar", "Innovator"]' data-period="3000">Student</span></div>
      <h2 id="project-title-display" class="visible" style="color: var(--text-muted); font-weight: 500;">Loading your project...</h2>
    </header>

    <div class="stats-summary stagger-children">
      <div class="card glass stat-mini">
        <div class="form-label">Total Sessions</div>
        <div class="counter gradient-text" style="font-size: 2rem; font-weight: 800;" id="stat-sessions" data-target="0">0</div>
      </div>
      <div class="card glass stat-mini">
        <div class="form-label">Avg. Defense Score</div>
        <div class="counter gradient-text" style="font-size: 2rem; font-weight: 800;" id="stat-score" data-target="0" data-decimals="2">0.00</div>
      </div>
      <div class="card glass stat-mini">
        <div class="form-label">Questions Mastered</div>
        <div class="counter gradient-text" style="font-size: 2rem; font-weight: 800;" id="stat-qs" data-target="0">0</div>
      </div>
    </div>

    <div id="dashboard-content" class="dashboard-grid stagger-children">
      <!-- Skeleton Loaders -->
      <div class="card glass skeleton" style="height: 240px;"></div>
      <div class="card glass skeleton" style="height: 240px;"></div>
      <div class="card glass skeleton" style="height: 240px;"></div>
      <div class="card glass skeleton" style="height: 240px;"></div>
      <div class="card glass skeleton" style="height: 240px;"></div>
      <div class="card glass skeleton" style="height: 240px;"></div>
    </div>
  </main>

  <script src="nav.js"></script>
  <script>
    const studentId = localStorage.getItem('studentId');
    if (!studentId) window.location.href = 'onboarding.html';

    async function loadDashboard() {
      try {
        const res = await fetch(`/api/students/${studentId}`);
        if (!res.ok) throw new Error('Student data not found');
        const student = await res.json();

        const qRes = await fetch(`/api/questions/${studentId}`);
        const hasQuestions = qRes.ok;

        const sRes = await fetch(`/api/scores/${studentId}`);
        const sessions = await sRes.json() || [];

        renderHeader(student);
        renderStats(sessions);
        renderActions(hasQuestions);
      } catch (err) {
        showToast(err.message, 'error');
        if (err.message.includes('not found')) {
          localStorage.removeItem('studentId');
          window.location.href = 'onboarding.html';
        }
      }
    }

    function renderHeader(student) {
      document.getElementById('project-title-display').textContent = student.title;
      const greetingEl = document.getElementById('student-name-display');
      greetingEl.dataset.phrases = JSON.stringify([student.name.split(' ')[0], "Scholar", "Innovator"]);
    }

    function renderStats(sessions) {
      const totalQs = sessions.reduce((acc, s) => acc + s.responses.length, 0);
      const avgScore = sessions.length > 0 ? sessions.reduce((acc, s) => acc + s.average, 0) / sessions.length : 0;

      document.getElementById('stat-sessions').dataset.target = sessions.length;
      document.getElementById('stat-score').dataset.target = avgScore;
      document.getElementById('stat-qs').dataset.target = totalQs;
      
      // Refresh counters
      document.querySelectorAll('.counter').forEach(c => {
        animateCounter(c, 0, parseFloat(c.dataset.target), 1500, c.dataset.decimals || 0);
      });
    }

    function renderActions(hasQuestions) {
      const content = document.getElementById('dashboard-content');
      content.innerHTML = `
        <div class="card glass action-card card-3d">
          <span class="card-icon">🧠</span>
          <h3>Generate Questions</h3>
          <p style="color: var(--text-muted); font-size: 0.9rem;">Let AI analyze your project architecture and build 10 tiered defense questions.</p>
          <div class="card-footer">
            <button id="btn-generate" class="btn btn-primary" style="width:100%" ${hasQuestions ? 'disabled' : ''}>
              ${hasQuestions ? 'Questions Ready ✓' : 'Generate Now'}
            </button>
          </div>
        </div>

        <div class="card glass action-card card-3d">
          <span class="card-icon">⚔️</span>
          <h3>Solo Practice</h3>
          <p style="color: var(--text-muted); font-size: 0.9rem;">Start a private rehearsal session with real-time AI scoring and feedback.</p>
          <div class="card-footer">
            <a href="defense.html" class="btn btn-secondary ${!hasQuestions ? 'disabled' : ''}" style="width:100%">Start Rehearsal</a>
          </div>
        </div>

        <div class="card glass action-card card-3d">
          <span class="card-icon">📚</span>
          <h3>Review Library</h3>
          <p style="color: var(--text-muted); font-size: 0.9rem;">Study the generated questions across all tiers to prepare your reasoning.</p>
          <div class="card-footer">
            <a href="questions.html" class="btn btn-secondary ${!hasQuestions ? 'disabled' : ''}" style="width:100%">View Questions</a>
          </div>
        </div>

        <div class="card glass action-card card-3d">
          <span class="card-icon">📈</span>
          <h3>Performance Profile</h3>
          <p style="color: var(--text-muted); font-size: 0.9rem;">Track your growth trajectory, dimension averages, and session history.</p>
          <div class="card-footer">
            <a href="profile.html" class="btn btn-secondary" style="width:100%">Open Profile</a>
          </div>
        </div>

        <div class="card glass action-card card-3d">
          <span class="card-icon">💡</span>
          <h3>AI Coaching</h3>
          <p style="color: var(--text-muted); font-size: 0.9rem;">Get targeted tips for your weakest performance dimensions and practice more.</p>
          <div class="card-footer">
            <a href="coaching.html" class="btn btn-secondary" style="width:100%">Get Coaching</a>
          </div>
        </div>

        <div class="card glass action-card card-3d">
          <span class="card-icon">🌐</span>
          <h3>Join Live Panel</h3>
          <p style="color: var(--text-muted); font-size: 0.9rem;">Enter a room code to join a live defense hosted by your faculty.</p>
          <div class="card-footer" style="display: flex; gap: 0.5rem;">
            <input type="text" id="room-code" class="form-input" placeholder="ROOM ID" style="text-transform: uppercase; padding: 0.6rem;">
            <button id="btn-join-live" class="btn btn-secondary">Join</button>
          </div>
        </div>
      `;

      document.getElementById('btn-generate')?.addEventListener('click', generateQuestions);
      document.getElementById('btn-join-live')?.addEventListener('click', () => {
        const code = document.getElementById('room-code').value.trim().toUpperCase();
        if (code) window.location.href = `defense.html?room=${code}`;
        else showToast('Enter a room code', 'error');
      });
      
      init3DTilt();
    }

    async function generateQuestions(e) {
      const btn = e.currentTarget;
      btn.classList.add('btn--loading');
      try {
        const res = await fetch(`/api/generate-questions/${studentId}`, { method: 'POST' });
        if (!res.ok) throw new Error('Generation failed');
        
        triggerConfetti();
        showToast('Questions generated successfully!', 'success');
        renderActions(true);
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.classList.remove('btn--loading');
      }
    }

    loadDashboard();
  </script>
</body>
</html>
