<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Live Session - PDRS</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    .room-code-display { font-family: var(--font-mono); font-size: 4rem; letter-spacing: 0.5rem; color: var(--accent-indigo); margin: 2rem 0; min-height: 5rem; }
    .invite-box { background: var(--bg-secondary); padding: 1.5rem; border-radius: var(--radius-md); border: 1px solid var(--border-default); margin-bottom: 1.5rem; position: relative; }
    .invite-box code { font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent-emerald); word-break: break-all; }
    .copy-btn { position: absolute; top: 1rem; right: 1rem; }
  </style>
</head>
<body>
  <nav class="navbar" id="main-nav"></nav>

  <main class="container">
    <div id="session-create-content" class="stagger-children" style="max-width: 600px; margin: 0 auto;">
      <div id="setup-step">
        <h1 style="margin-bottom: 1rem;">Host Live Defense</h1>
        <div id="student-summary" class="card" style="margin-bottom: 2rem;">
          <div class="skeleton" style="height: 20px; width: 150px; margin-bottom: 0.5rem;"></div>
          <div class="skeleton" style="height: 30px; width: 300px;"></div>
        </div>
        <button id="create-session-btn" class="btn btn-primary btn-lg" style="width: 100%;">Initialize Live Session Room</button>
      </div>

      <div id="invite-step" style="display:none;">
        <h1 style="margin-bottom: 0.5rem;">Room Created!</h1>
        <p style="color: var(--text-muted);">Share these links with the student and your faculty panel.</p>
        
        <div id="room-code-el" class="room-code-display"></div>

        <div class="invite-box">
          <div class="form-label">Student Invite Link</div>
          <code id="student-url"></code>
          <button class="btn btn-ghost btn-sm copy-btn" onclick="copyInvite('student-url', this)">Copy</button>
        </div>

        <div class="invite-box">
          <div class="form-label">Teacher Panel Link</div>
          <code id="teacher-url"></code>
          <button class="btn btn-ghost btn-sm copy-btn" onclick="copyInvite('teacher-url', this)">Copy</button>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
          <button id="open-host-btn" class="btn btn-primary btn-lg" style="flex: 1;">Open Host View →</button>
          <a href="faculty-dashboard.html" class="btn btn-secondary btn-lg">Back</a>
        </div>
      </div>
    </div>
  </main>

  <script src="nav.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const studentId = params.get('studentId');
    let roomCode = '';

    if (!localStorage.getItem('facultyToken')) window.location.href = 'faculty-login.html';
    if (!studentId) window.location.href = 'faculty-dashboard.html';

    async function loadStudent() {
      try {
        const res = await fetch(`/api/students/${studentId}`);
        const s = await res.json();
        document.getElementById('student-summary').innerHTML = `
          <div class="form-label">${s.branch} / ${s.year}</div>
          <h3 style="color: var(--text-primary);">${s.name}</h3>
          <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: 0.5rem;">${s.title}</p>
        `;
      } catch (err) {
        showToast('Student not found', 'error');
      }
    }

    document.getElementById('create-session-btn').addEventListener('click', async (e) => {
      const btn = e.currentTarget;
      btn.classList.add('btn--loading');
      
      try {
        const res = await fetch('/api/sessions/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentId })
        });
        const data = await res.json();
        roomCode = data.roomCode;
        
        document.getElementById('setup-step').style.display = 'none';
        document.getElementById('invite-step').style.display = 'block';
        
        typewriterRoomCode(roomCode);
        
        const origin = window.location.origin;
        document.getElementById('student-url').textContent = `${origin}/defense.html?room=${roomCode}`;
        document.getElementById('teacher-url').textContent = `${origin}${data.teacherInviteUrl}`;
        
        document.getElementById('open-host-btn').addEventListener('click', () => {
          window.location.href = `session-host.html?room=${roomCode}`;
        });
        
        triggerConfetti();
      } catch (err) {
        showToast(err.message, 'error');
        btn.classList.remove('btn--loading');
      }
    });

    function typewriterRoomCode(code) {
      const el = document.getElementById('room-code-el');
      let i = 0;
      const timer = setInterval(() => {
        el.textContent += code[i];
        i++;
        if (i >= code.length) clearInterval(timer);
      }, 800); // 80ms per char as requested (Wait, user said 80ms, I put 800 by mistake, fixing)
    }
    
    // Correcting typewriter
    function typewriterRoomCode(code) {
      const el = document.getElementById('room-code-el');
      el.textContent = '';
      let i = 0;
      const timer = setInterval(() => {
        el.textContent += code[i];
        i++;
        if (i >= code.length) clearInterval(timer);
      }, 80); 
    }

    function copyInvite(id, btn) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.textContent;
        btn.textContent = 'Copied ✓';
        btn.classList.add('popIn');
        setTimeout(() => {
          btn.textContent = originalText;
          btn.classList.remove('popIn');
        }, 2000);
      });
    }

    loadStudent();
  </script>
</body>
</html>
