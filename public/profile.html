<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Profile - PDRS</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .profile-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; }
    .metric-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .trajectory-chart { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1.5rem; height: 300px; position: relative; }
    .chart-svg { width: 100%; height: 100%; }
    .chart-path { fill: none; stroke: var(--accent-indigo); stroke-width: 3; stroke-linecap: round; }
    .chart-dot { fill: var(--bg-primary); stroke: var(--accent-indigo); stroke-width: 2; cursor: pointer; transition: transform 0.2s; }
    .chart-dot:hover { transform: scale(1.5); }
    .delta-up { color: var(--accent-emerald); }
    .delta-down { color: var(--accent-red); }
  </style>
</head>
<body>
  <nav class="navbar" id="main-nav"></nav>

  <main class="container">
    <div id="profile-content" class="stagger-children">
      <header style="margin-bottom: 3rem;">
        <h1 id="profile-name">Student Profile</h1>
        <p id="profile-title" style="color: var(--text-muted);"></p>
      </header>

      <div class="metric-cards">
        <div class="card">
          <div class="form-label">Total Sessions</div>
          <div class="counter" id="total-sessions" style="font-size: 2rem; font-weight: 700; color: var(--accent-indigo);" data-target="0">0</div>
        </div>
        <div class="card">
          <div class="form-label">Avg. Score</div>
          <div class="counter" id="avg-score" style="font-size: 2rem; font-weight: 700; color: var(--accent-emerald);" data-target="0" data-decimals="2">0.00</div>
        </div>
        <div class="card">
          <div class="form-label">Questions Answered</div>
          <div class="counter" id="total-qs" style="font-size: 2rem; font-weight: 700; color: var(--accent-amber);" data-target="0">0</div>
        </div>
      </div>

      <div class="profile-grid">
        <div class="card">
          <h3 style="margin-bottom: 1.5rem;">Dimension Analysis</h3>
          <div id="dimension-bars" class="stagger-children">
            <!-- Bars populated by JS -->
          </div>
        </div>

        <div class="card">
          <h3 style="margin-bottom: 1.5rem;">Performance Trajectory</h3>
          <div class="trajectory-chart">
            <svg class="chart-svg" viewBox="0 0 800 300" id="trajectory-svg">
              <path id="chart-line" class="chart-path"></path>
            </svg>
            <div id="chart-empty" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--text-faint); display:none;">No session data yet</div>
          </div>
        </div>
      </div>

      <div class="card" style="margin-top: 2rem;">
        <h3 style="margin-bottom: 1.5rem;">Session History</h3>
        <div class="data-table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Questions</th>
                <th>Avg. Score</th>
                <th>Delta</th>
              </tr>
            </thead>
            <tbody id="session-history">
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="nav.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const studentId = params.get('studentId') || localStorage.getItem('studentId');

    if (!studentId) window.location.href = 'onboarding.html';

    async function loadProfile() {
      try {
        const res = await fetch(`/api/profile/${studentId}`);
        if (!res.ok) throw new Error('Profile not found');
        const data = await res.json();
        renderProfile(data);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function renderProfile({ student, sessions }) {
      document.getElementById('profile-name').textContent = student.name;
      document.getElementById('profile-title').textContent = `${student.title} | ${student.branch} ${student.year}`;

      const totalQs = sessions.reduce((acc, s) => acc + s.responses.length, 0);
      const totalAvg = sessions.length > 0 ? sessions.reduce((acc, s) => acc + s.average, 0) / sessions.length : 0;

      document.getElementById('total-sessions').dataset.target = sessions.length;
      document.getElementById('avg-score').dataset.target = totalAvg;
      document.getElementById('total-qs').dataset.target = totalQs;

      // Dimension Bars
      const dims = ['clarity', 'reasoning', 'depth', 'confidence'];
      const dimAverages = dims.reduce((acc, dim) => {
        const total = sessions.reduce((sAcc, s) => {
          const sAvg = s.responses.reduce((rAcc, r) => rAcc + r.scores[dim], 0) / s.responses.length;
          return sAcc + sAvg;
        }, 0);
        acc[dim] = sessions.length > 0 ? total / sessions.length : 0;
        return acc;
      }, {});

      const barsContainer = document.getElementById('dimension-bars');
      barsContainer.innerHTML = dims.map((dim, i) => `
        <div style="margin-bottom: 1.5rem;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
            <span class="form-label" style="text-transform: capitalize;">${dim}</span>
            <span style="font-weight: 700; color: var(--accent-indigo);">${(dimAverages[dim] || 0).toFixed(2)}</span>
          </div>
          <div class="dim-bar-container">
            <div class="dim-bar-fill" style="--target-width: ${(dimAverages[dim] || 0) * 20}%; --delay: ${i * 0.1}s"></div>
          </div>
        </div>
      `).join('');

      // Trajectory Chart
      renderChart(sessions);

      // Session History
      const historyTable = document.getElementById('session-history');
      if (sessions.length === 0) {
        historyTable.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 2rem;">No sessions yet. Start your first rehearsal!</td></tr>';
      } else {
        historyTable.innerHTML = sessions.map((s, i) => {
          const delta = i === 0 ? 0 : s.average - sessions[i - 1].average;
          const deltaClass = delta > 0 ? 'delta-up' : (delta < 0 ? 'delta-down' : '');
          const deltaIcon = delta > 0 ? '↑' : (delta < 0 ? '↓' : '-');
          
          return `
            <tr>
              <td>${new Date(s.date).toLocaleDateString()}</td>
              <td style="text-transform: capitalize;">${s.type}</td>
              <td>${s.responses.length}</td>
              <td style="font-weight: 700;">${(s.average || 0).toFixed(2)}</td>
              <td class="${deltaClass}">${deltaIcon} ${(Math.abs(delta) || 0).toFixed(2)}</td>
            </tr>
          `;
        }).reverse().join('');
      }

      // Trigger counters
      document.querySelectorAll('.counter').forEach(c => {
        animateCounter(c, 0, parseFloat(c.dataset.target), 1200, c.dataset.decimals || 0);
      });
    }

    function renderChart(sessions) {
      const svg = document.getElementById('trajectory-svg');
      const line = document.getElementById('chart-line');
      const emptyMsg = document.getElementById('chart-empty');

      if (sessions.length < 2) {
        emptyMsg.style.display = 'flex';
        return;
      }

      const points = sessions.map((s, i) => ({
        x: (i / (sessions.length - 1)) * 750 + 25,
        y: 275 - (s.average / 5) * 250
      }));

      const d = `M ${points[0].x} ${points[0].y} ` + points.slice(1).map(p => `L ${p.x} ${p.y}`).join(' ');
      line.setAttribute('d', d);
      
      const length = line.getTotalLength();
      line.style.setProperty('--path-length', length);
      line.style.strokeDasharray = length;
      line.style.strokeDashoffset = length;
      line.style.animation = 'drawPath 2s ease-out forwards';

      points.forEach(p => {
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', p.x);
        circle.setAttribute('cy', p.y);
        circle.setAttribute('r', '6');
        circle.setAttribute('class', 'chart-dot');
        circle.style.animation = 'popIn 0.5s var(--ease-bounce) forwards';
        svg.appendChild(circle);
      });
    }

    loadProfile();
  </script>
</body>
</html>
