<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Login - PDRS</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    .login-container { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 64px); }
    .login-card { width: 100%; max-width: 420px; }
    .toggle-password { position: absolute; right: 1rem; top: 1.5rem; cursor: pointer; color: var(--text-faint); font-size: 0.8rem; font-weight: 700; }
  </style>
</head>
<body>
  <nav class="navbar" id="main-nav"></nav>

  <main class="container login-container">
    <div class="card login-card glass card-3d stagger-children">
      <div style="text-align: center; margin-bottom: 2.5rem;">
        <div style="font-size: 3.5rem; margin-bottom: 1rem;">💼</div>
        <h1 class="gradient-text">Faculty Portal</h1>
        <p style="color: var(--text-muted);">Sign in to manage your rehearsal sessions.</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <input type="email" id="email" class="form-input" required placeholder=" ">
          <label class="form-label-floating">Email Address</label>
        </div>

        <div class="form-group">
          <input type="password" id="password" class="form-input" required placeholder=" ">
          <label class="form-label-floating">Password</label>
          <span class="toggle-password" id="toggle-pw">SHOW</span>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login to Dashboard</button>
      </form>

      <div style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--border-subtle); padding-top: 1.5rem;">
        <p style="font-size: 0.9rem; color: var(--text-muted);">Don't have an account? <a href="faculty-register.html" style="color: var(--accent-indigo); font-weight: 600;">Register here →</a></p>
      </div>
    </div>
  </main>

  <script src="nav.js"></script>
  <script>
    if (localStorage.getItem('facultyRole') === 'faculty') {
      window.location.href = 'faculty-dashboard.html';
    }

    const toggleBtn = document.getElementById('toggle-pw');
    const pwInput = document.getElementById('password');
    toggleBtn.addEventListener('click', () => {
      const type = pwInput.getAttribute('type') === 'password' ? 'text' : 'password';
      pwInput.setAttribute('type', type);
      toggleBtn.textContent = type === 'password' ? 'SHOW' : 'HIDE';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const email = document.getElementById('email').value;
      const password = pwInput.value;

      btn.classList.add('btn--loading');
      
      try {
        const res = await fetch('/api/faculty/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || 'Login failed');
        }

        const data = await res.json();
        localStorage.setItem('facultyToken', data.token);
        localStorage.setItem('facultyRole', data.role);
        localStorage.setItem('facultyName', data.name);
        
        triggerConfetti();
        showToast(`Welcome back, ${data.name}!`, 'success');
        
        setTimeout(() => {
          window.location.href = 'faculty-dashboard.html';
        }, 800);
      } catch (err) {
        showToast(err.message, 'error');
        document.querySelector('.login-card').style.animation = 'shake 0.4s';
        setTimeout(() => document.querySelector('.login-card').style.animation = '', 400);
        btn.classList.remove('btn--loading');
      }
    });
  </script>
</body>
</html>
