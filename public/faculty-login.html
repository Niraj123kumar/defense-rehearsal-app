<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Login — PDRS</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .login-wrap {
      width: 100%; max-width: 420px;
      padding: 0 var(--sp-2);
    }

    .login-logo {
      text-align: center;
      margin-bottom: var(--sp-4);
    }
    .login-logo a {
      font-family: var(--font-mono);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent-indigo);
      text-decoration: none;
    }
    .login-logo a span { color: var(--text-primary); }
    .login-logo p {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-xl);
      padding: var(--sp-4);
      backdrop-filter: blur(12px);
    }

    .login-card h2 {
      font-size: 1.4rem;
      margin-bottom: 6px;
    }
    .login-card .subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: var(--sp-3);
    }

    .input-icon-wrap {
      position: relative;
    }
    .input-icon-wrap input {
      padding-left: 40px;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
      pointer-events: none;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      font-size: 1rem;
      border-radius: var(--radius-md);
      margin-top: var(--sp-1);
    }

    .divider {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin: var(--sp-3) 0 var(--sp-2);
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: var(--border-subtle);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .back-link {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .back-link a { color: var(--accent-indigo); }

    /* change-password panel */
    .change-pw-panel { display: none; }
    .change-pw-panel.visible { display: block; }

    #msg { margin-bottom: var(--sp-2); }

    .role-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: var(--radius-pill);
      padding: 4px 12px;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      color: var(--accent-indigo);
      margin-bottom: var(--sp-2);
    }
  </style>
</head>
<body>
  <div class="login-wrap">

    <div class="login-logo">
      <a href="index.html">PDRS<span>.dev</span></a>
      <p>Project Defense Rehearsal System</p>
    </div>

    <!-- Login Form -->
    <div class="login-card" id="login-panel">
      <span class="role-pill">🧑‍🏫 Faculty Portal</span>
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in with your faculty credentials</p>

      <div id="msg"></div>

      <div class="form-group">
        <label>Email address</label>
        <div class="input-icon-wrap">
          <span class="input-icon">✉</span>
          <input type="email" id="email" placeholder="you@college.edu" autocomplete="email" autofocus>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-icon-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"
                 onkeydown="if(event.key==='Enter') doLogin()">
        </div>
      </div>

      <button class="btn btn-primary btn-login" id="login-btn" onclick="doLogin()">
        Sign in to Faculty Portal →
      </button>

      <div class="divider">or</div>
      <div class="back-link">
        <a href="index.html">← Back to home</a>
      </div>
    </div>

    <!-- Change Password Panel (shown after first login) -->
    <div class="login-card change-pw-panel" id="change-pw-panel">
      <span class="role-pill">🔐 First Login</span>
      <h2>Set your password</h2>
      <p class="subtitle">You're using a temporary password. Please set a new one to continue.</p>

      <div id="cpw-msg"></div>

      <div class="form-group">
        <label>New Password</label>
        <div class="input-icon-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="new-pw" placeholder="Minimum 8 characters"
                 onkeydown="if(event.key==='Enter') doChangePw()">
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-icon-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="confirm-pw" placeholder="Repeat new password"
                 onkeydown="if(event.key==='Enter') doChangePw()">
        </div>
      </div>

      <button class="btn btn-primary btn-login" id="cpw-btn" onclick="doChangePw()">
        Set Password & Continue →
      </button>
    </div>

  </div>

  <script>
    // If already logged in, redirect immediately
    (function() {
      const token = localStorage.getItem('pdrs_faculty_token');
      const role  = localStorage.getItem('pdrs_role');
      if (token && role === 'faculty') window.location.href = 'faculty-dashboard.html';
    })();

    let _pendingToken = null;

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');
      const msg      = document.getElementById('msg');

      msg.innerHTML = '';
      if (!email || !password) {
        msg.innerHTML = '<div class="msg-error">Please enter both email and password.</div>';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res  = await fetch('/api/faculty/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          msg.innerHTML = `<div class="msg-error">⚠ ${data.error || 'Login failed'}</div>`;
          btn.disabled = false;
          btn.textContent = 'Sign in to Faculty Portal →';
          return;
        }

        // Must change password on first login
        if (data.mustChangePw) {
          _pendingToken = data.token;
          document.getElementById('login-panel').style.display     = 'none';
          document.getElementById('change-pw-panel').classList.add('visible');
          return;
        }

        // Success — store and redirect
        localStorage.setItem('pdrs_faculty_token', data.token);
        localStorage.setItem('pdrs_faculty_name', data.name);
        localStorage.setItem('pdrs_faculty_role', data.role);
        localStorage.setItem('pdrs_role', 'faculty');
        window.location.href = 'faculty-dashboard.html';

      } catch (e) {
        msg.innerHTML = `<div class="msg-error">Server error: ${e.message}</div>`;
        btn.disabled = false;
        btn.textContent = 'Sign in to Faculty Portal →';
      }
    }

    async function doChangePw() {
      const newPw     = document.getElementById('new-pw').value;
      const confirmPw = document.getElementById('confirm-pw').value;
      const btn       = document.getElementById('cpw-btn');
      const msg       = document.getElementById('cpw-msg');

      msg.innerHTML = '';
      if (newPw.length < 8) {
        msg.innerHTML = '<div class="msg-error">Password must be at least 8 characters.</div>';
        return;
      }
      if (newPw !== confirmPw) {
        msg.innerHTML = '<div class="msg-error">Passwords do not match.</div>';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Saving…';

      try {
        const res  = await fetch('/api/faculty/change-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${_pendingToken}`
          },
          body: JSON.stringify({ newPassword: newPw })
        });
        const data = await res.json();
        if (!res.ok) {
          msg.innerHTML = `<div class="msg-error">⚠ ${data.error}</div>`;
          btn.disabled = false;
          btn.textContent = 'Set Password & Continue →';
          return;
        }

        // Re-login with new password to get a fresh token
        const email    = document.getElementById('email').value.trim();
        const res2     = await fetch('/api/faculty/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: newPw })
        });
        const data2 = await res2.json();

        localStorage.setItem('pdrs_faculty_token', data2.token);
        localStorage.setItem('pdrs_faculty_name', data2.name);
        localStorage.setItem('pdrs_faculty_role', data2.role);
        localStorage.setItem('pdrs_role', 'faculty');
        window.location.href = 'faculty-dashboard.html';
      } catch (e) {
        msg.innerHTML = `<div class="msg-error">Server error: ${e.message}</div>`;
        btn.disabled = false;
        btn.textContent = 'Set Password & Continue →';
      }
    }
  </script>
</body>
</html>
